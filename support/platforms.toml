# Machine-readable support declaration.
#
# Source of truth for docs/reference/support-matrix.md (generated by
# `ost internal docs generate`) and, later, for CI matrix validation. Edit the
# levels here deliberately; each cell is an explicit support claim, not a guess.
#
# Levels: stable | beta | experimental | unsupported (defined below). Every
# feature must declare a level for every platform id, or generation fails.

[levels.stable]
description = "Covered by release CI and expected to work for production use."

[levels.beta]
description = "Regularly tested but may contain known limitations."

[levels.experimental]
description = "Available for evaluation without a compatibility commitment."

[levels.unsupported]
description = "Intentionally unavailable, not applicable, or untested."

# Columns, in display order. `id` is referenced by each feature's `support` map.
[[platforms]]
id = "linux_x86_64"
label = "Linux x86_64"

[[platforms]]
id = "macos_arm64"
label = "macOS arm64"

[[platforms]]
id = "macos_x86_64"
label = "macOS x86_64"

[[platforms]]
id = "windows_x86_64"
label = "Windows x86_64"

# Rows, in display order. Linux x86_64 is the first-class target; other targets
# are modeled and range from proven to evaluation-only.

[[features]]
id = "cli_distribution"
label = "CLI distribution"
support = { linux_x86_64 = "stable", macos_arm64 = "stable", macos_x86_64 = "stable", windows_x86_64 = "stable" }

[[features]]
id = "runtime_adopt"
label = "Runtime adoption (--from-usd)"
support = { linux_x86_64 = "stable", macos_arm64 = "beta", macos_x86_64 = "experimental", windows_x86_64 = "stable" }

[[features]]
id = "runtime_source_build"
label = "Runtime source build (--build)"
note = "macOS source builds can need full Xcode for upstream codesign; see the runtime build notes."
support = { linux_x86_64 = "beta", macos_arm64 = "experimental", macos_x86_64 = "experimental", windows_x86_64 = "beta" }

[[features]]
id = "runtime_validate"
label = "Runtime validation"
support = { linux_x86_64 = "stable", macos_arm64 = "stable", macos_x86_64 = "stable", windows_x86_64 = "stable" }

[[features]]
id = "oci_pull"
label = "OCI artifact pull"
support = { linux_x86_64 = "stable", macos_arm64 = "beta", macos_x86_64 = "experimental", windows_x86_64 = "stable" }

[[features]]
id = "oci_push"
label = "OCI artifact push"
note = "The GHCR user/password push path has not yet been round-tripped end to end; tracked in roadmap/current.md."
support = { linux_x86_64 = "beta", macos_arm64 = "beta", macos_x86_64 = "beta", windows_x86_64 = "beta" }

[[features]]
id = "plugin_build"
label = "Plugin build"
support = { linux_x86_64 = "stable", macos_arm64 = "beta", macos_x86_64 = "experimental", windows_x86_64 = "stable" }

[[features]]
id = "plugin_test"
label = "Plugin test (verification pyramid)"
support = { linux_x86_64 = "stable", macos_arm64 = "beta", macos_x86_64 = "experimental", windows_x86_64 = "stable" }

[[features]]
id = "github_hosted_ci"
label = "GitHub-hosted CI"
note = "Windows source-CI is proven green end to end; the macOS lane is pending a public-runtime republish (roadmap/current.md)."
support = { linux_x86_64 = "stable", macos_arm64 = "beta", macos_x86_64 = "experimental", windows_x86_64 = "stable" }

[[features]]
id = "self_hosted_ci"
label = "Self-hosted CI"
support = { linux_x86_64 = "beta", macos_arm64 = "beta", macos_x86_64 = "beta", windows_x86_64 = "beta" }

[[features]]
id = "exec_bit_preservation"
label = "Executable permission preservation"
note = "A Unix concept; Windows has no execute bit to preserve."
support = { linux_x86_64 = "stable", macos_arm64 = "beta", macos_x86_64 = "beta", windows_x86_64 = "unsupported" }

[[features]]
id = "symlink_preservation"
label = "In-tree symlink preservation"
note = "Linux SDK soname chains; not part of the Windows packaging model."
support = { linux_x86_64 = "stable", macos_arm64 = "beta", macos_x86_64 = "beta", windows_x86_64 = "unsupported" }

[[features]]
id = "glibc_floor_validation"
label = "glibc floor validation"
note = "A Linux-only concept (ELF scan of the runtime's binaries)."
support = { linux_x86_64 = "stable", macos_arm64 = "unsupported", macos_x86_64 = "unsupported", windows_x86_64 = "unsupported" }

[[features]]
id = "dcc_integration"
label = "DCC host integration"
note = "Planned (Phase 10 / v0.16.0); not yet implemented on any platform."
support = { linux_x86_64 = "unsupported", macos_arm64 = "unsupported", macos_x86_64 = "unsupported", windows_x86_64 = "unsupported" }
