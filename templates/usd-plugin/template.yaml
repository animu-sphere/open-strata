schema: openstrata.template/v1alpha1
template:
  id: usd-plugin
  version: 1.0.0
  maturity: skeleton
  artifact_kind: project
variables:
  - name: name
    type: portable-identifier
    required: true
outputs:
  files:
    - CMakeLists.txt
    - README.md
    - .gitignore
    - src/{{name}}.cpp
    - plugin/resources/plugInfo.json
    - openstrata.scaffold.yaml
verification:
  assertions: [configure, build, install]
compatibility:
  ost: ">=0.13,<1.0"
  openusd: ">=25.05,<27.0"
