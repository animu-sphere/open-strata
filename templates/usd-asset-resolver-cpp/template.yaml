schema: openstrata.template/v1alpha1
template:
  id: usd-asset-resolver-cpp
  version: 0.2.0
  maturity: skeleton
  artifact_kind: plugin
plugin_kind: usd-asset-resolver
variables:
  - name: name
    type: portable-identifier
    required: true
  - name: scheme
    type: uri-scheme
    required: true
outputs:
  files:
    - openstrata.plugin.yaml
    - CMakeLists.txt
    - README.md
    - .gitignore
    - cmake/OpenStrataPlugin.cmake
    - src/{{Name}}Resolver.h
    - src/{{Name}}Resolver.cpp
    - plugin/resources/{{name}}/plugInfo.json.in
    - plugin/resources/{{name}}/plugInfo.json
    - tests/fixtures/basic.usda
    - tests/fixtures/referenced.usda
    - openstrata.scaffold.yaml
verification:
  levels: [0, 1, 2]
  assertions: [deterministic-generation, resolver-registration, install-tree-discovery]
compatibility:
  ost: ">=0.13,<1.0"
  openusd: ">=25.05,<27.0"
