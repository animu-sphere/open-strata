[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax).
# Linux ships as a fully static musl binary for old-glibc portability.
targets = ["x86_64-unknown-linux-musl", "aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Extra files bundled into every release archive. cargo-dist auto-includes
# LICENSE + README; NOTICE and THIRD_PARTY_NOTICES (Apache-2.0 attribution +
# upstream Rust crate licenses) are listed explicitly so no artifact ships
# without complete attribution.
include = ["NOTICE", "THIRD_PARTY_NOTICES.md"]
# Only plan (don't run heavy multi-OS builds) on PRs; full builds run on tags.
pr-run-mode = "plan"
# Attach GitHub build provenance attestations (SLSA) to release artifacts.
github-attestations = true
# The generated release.yml is hand-edited to pin every third-party action to a
# full commit SHA (harness §SEC-004), which diverges from dist's generated
# output. Tell dist not to fail its "CI is up to date" check on that divergence.
# Trade-off: a dist version bump needs the workflow regenerated and re-pinned by
# hand (see docs/roadmap/README.md → Security baseline).
allow-dirty = ["ci"]
