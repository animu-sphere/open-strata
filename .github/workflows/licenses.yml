# License / attribution gate. Keeps the dependency tree on permissive licenses,
# flags security advisories, and verifies THIRD_PARTY_NOTICES.md is in sync with
# the dependency graph. Ubuntu-only (cheap) so it can run on every PR.
name: licenses

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  licenses:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Prebuilt cargo-deny / cargo-about (no compile). The toolchain pinned in
      # rust-toolchain.toml is auto-installed by rustup when cargo is invoked.
      # Versions are pinned: cargo-about's output formatting can change between
      # releases, which would make the THIRD_PARTY_NOTICES.md sync check below
      # fail on an unrelated PR. Bump deliberately and regenerate the file.
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-deny@0.19.9,cargo-about@0.9.0

      - name: cargo-deny (licenses, advisories, sources, bans)
        run: cargo deny check

      - name: THIRD_PARTY_NOTICES.md is up to date
        # Normalize CRLF -> LF and collapse trailing blank lines before diffing:
        # some upstream license files ship CRLF, and cargo-about/template changes
        # can otherwise make the check fail on a final empty line only.
        run: |
          trap 'rm -f THIRD_PARTY_NOTICES.generated.md THIRD_PARTY_NOTICES.expected.md THIRD_PARTY_NOTICES.check.md' EXIT

          normalize_notice() {
            perl -0pe 's/\r//g; s/[ \t\n]+\z/\n/; $_ .= "\n" unless /\n\z/' "$1"
          }

          cargo about generate about.hbs --output-file THIRD_PARTY_NOTICES.generated.md
          normalize_notice THIRD_PARTY_NOTICES.md > THIRD_PARTY_NOTICES.expected.md
          normalize_notice THIRD_PARTY_NOTICES.generated.md > THIRD_PARTY_NOTICES.check.md

          if ! diff -u THIRD_PARTY_NOTICES.expected.md THIRD_PARTY_NOTICES.check.md; then
            echo "::error::THIRD_PARTY_NOTICES.md is stale — run: cargo about generate about.hbs --output-file THIRD_PARTY_NOTICES.md"
            exit 1
          fi
